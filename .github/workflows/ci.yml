name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast native gate: fmt + clippy + test + build on every push/PR.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install libpcap (pcap crate link-binds it)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libpcap0.8-dev
      - name: Rust components
        run: rustup component add rustfmt clippy
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo build --release

  # Static musl artifacts for routers. Runs on tags + manual dispatch only
  # (the Docker + libpcap cross-build is heavy; PRs/master stay on `check`).
  cross:
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write   # attach binaries to the GitHub Release on tags
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-musl      # UDM, Pi 3/4/5, GL.iNet arm64
            tag: aarch64-musl
          - target: armv7-unknown-linux-musleabihf  # 32-bit ARM routers
            tag: armv7-musleabihf
          - target: x86_64-unknown-linux-musl       # x86 boxes, portable static
            tag: x86_64-musl
    steps:
      - uses: actions/checkout@v5
      - name: Cross-build ${{ matrix.target }}
        run: |
          docker build -f Dockerfile.musl \
            --build-arg RUST_MUSL_CROSS_TAG=${{ matrix.tag }} \
            --build-arg TARGET=${{ matrix.target }} \
            -t seq-agent-build .
          cid=$(docker create seq-agent-build)
          docker cp "$cid:/seq-agent" "seq-agent-${{ matrix.target }}"
          docker rm "$cid"
          file "seq-agent-${{ matrix.target }}"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: seq-agent-${{ matrix.target }}
          path: seq-agent-${{ matrix.target }}
          if-no-files-found: error
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: seq-agent-${{ matrix.target }}
